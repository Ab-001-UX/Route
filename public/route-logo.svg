<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Black square background -->
  <rect width="512" height="512" fill="#000000"/>
  
  <!-- Winding loop "R" logo centered in the 512x512 canvas -->
  <g transform="scale(4.5) translate(2, 12)">
    <!-- Outer white stroke of the road loop -->
    <path
      d="M 28 82 C 24 55 24 35 34 22 C 46 8 72 8 82 22 C 92 36 86 52 70 58 C 55 64 36 60 36 60 C 36 60 52 74 68 82"
      stroke="#ffffff"
      stroke-width="14"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Inner black dashed lane divider -->
    <path
      d="M 28 82 C 24 55 24 35 34 22 C 46 8 72 8 82 22 C 92 36 86 52 70 58 C 55 64 36 60 36 60 C 36 60 52 74 68 82"
      stroke="#000000"
      stroke-width="2.5"
      stroke-dasharray="6 4"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>
